<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPS Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__brand">
          <span class="header__icon">🚕</span>
          <span class="header__title">urbanTrack</span>
        </div>
        <div class="header__status">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="estado">Desconectado</span>
        </div>
      </header>
      <div class="taxi-stripe"></div>

      <main class="dashboard">
        <aside class="sidebar">

          <section class="card">
            <div class="card__header">
              <h2 class="card__title">📍 Posición Actual</h2>
              <span class="badge-live">
                <span class="badge-live__dot"></span>
                LIVE
              </span>
            </div>
            <div class="data-grid">
              <div class="data-item">
                <span class="data-item__label">Latitud</span>
                <span class="data-item__value data-item__value--coord" id="latitud">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Longitud</span>
                <span class="data-item__value data-item__value--coord" id="longitud">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Fecha</span>
                <span class="data-item__value" id="fecha">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Hora</span>
                <span class="data-item__value" id="hora">—</span>
              </div>
            </div>
          </section>

          <section class="mode-switch">
            <button id="btn-vivo" class="btn mode-switch__btn btn--active">Ver en vivo</button>
            <button id="btn-modo-historial" class="btn mode-switch__btn btn--inactive">Ver historial</button>
          </section>

          <!-- OBD Live Data (visible solo en modo vivo) -->
          <section class="card" id="card-obd-live">
            <div class="card__header">
              <h2 class="card__title">🔧 Telemetría OBD-II</h2>
            </div>
            <div class="data-grid">
              <div class="data-item">
                <span class="data-item__label">RPM</span>
                <span class="data-item__value" id="obd-rpm">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Temperatura</span>
                <span class="data-item__value" id="obd-temp">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Fuel Trim</span>
                <span class="data-item__value" id="obd-fuel">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">O₂ Voltaje</span>
                <span class="data-item__value" id="obd-o2">—</span>
              </div>
            </div>
          </section>

          <section class="card" id="card-historial" style="display:none">
            <div class="card__header">
              <h2 class="card__title">🕐 Historial</h2>
            </div>
            <div class="quick-range">
              <button class="quick-range__btn" id="btn-hoy">Hoy</button>
              <button class="quick-range__btn" id="btn-semana">1 semana</button>
              <button class="quick-range__btn" id="btn-mes">1 mes</button>
            </div>
            <div class="range-fields">
              <div class="range-field">
                <span class="range-field__label">Inicio</span>
                <input type="datetime-local" id="fecha-inicio" class="input-datetime" step="1" />
              </div>
              <div class="range-field">
                <span class="range-field__label">Fin</span>
                <input type="datetime-local" id="fecha-fin" class="input-datetime" step="1" />
              </div>
            </div>
            <div class="btn-group">
              <button id="btn-historial" class="btn btn--primary">Ver recorrido</button>
            </div>
          </section>

          <div id="slider-container" class="slider-container" style="display:none">
            <div id="slider-info" class="slider-info">—</div>
            <input type="range" id="slider-recorrido" class="slider-recorrido" min="0" max="0" value="0" step="1" />
            <button id="btn-ver-graficas" class="btn btn--primary" style="margin-top:12px;">📊 Ver telemetría histórica</button>
          </div>

        </aside>

        <div class="map-area">
          <div class="map-container">
            <div id="mapa"></div>
            <div class="map-info">
              <div class="map-info__row">
                <span class="map-info__label">Modo</span>
                <span class="map-info__value map-info__value--live" id="map-mode">EN VIVO</span>
              </div>
            </div>
          </div>
          <!-- Panel de graficas OBD (oculto por defecto, reemplaza el mapa) -->
          <div class="charts-panel" id="charts-panel" style="display:none">
            <div class="charts-panel__header">
              <h2 class="card__title">📊 Telemetría histórica</h2>
              <button id="btn-cerrar-graficas" class="btn btn--secondary" style="width:auto;padding:6px 14px;font-size:0.75rem;">Volver al mapa</button>
            </div>
            <div class="charts-grid">
              <div class="chart-box"><canvas id="chart-rpm"></canvas></div>
              <div class="chart-box"><canvas id="chart-temp"></canvas></div>
              <div class="chart-box"><canvas id="chart-fuel"></canvas></div>
              <div class="chart-box"><canvas id="chart-o2"></canvas></div>
            </div>
          </div>
        </div>
      </main>

      <footer class="footer">
        © 2026 <span>urbanTrack GPS</span> — Real-Time Fleet Management
      </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
