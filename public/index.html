<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPS Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__brand">
          <span class="header__icon">🚕</span>
          <span class="header__title">urbanTrack</span>
        </div>
        <div class="header__status">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="estado">Desconectado</span>
        </div>
      </header>
      <div class="taxi-stripe"></div>

      <main class="dashboard">
        <aside class="sidebar">

          <section class="card">
            <div class="card__header">
              <h2 class="card__title">📍 Posición Actual</h2>
              <span class="badge-live">
                <span class="badge-live__dot"></span>
                LIVE
              </span>
            </div>
            <div class="data-grid">
              <div class="data-item">
                <span class="data-item__label">Latitud</span>
                <span class="data-item__value data-item__value--coord" id="latitud">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Longitud</span>
                <span class="data-item__value data-item__value--coord" id="longitud">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Fecha</span>
                <span class="data-item__value" id="fecha">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Hora</span>
                <span class="data-item__value" id="hora">—</span>
              </div>
            </div>
          </section>

          <section class="card">
            <div class="card__header">
              <h2 class="card__title">🕐 Historial</h2>
            </div>

            <!-- Tab buttons -->
            <div class="tab-group">
              <button class="tab-btn tab-btn--active" id="tab-recorrido">Por fecha</button>
              <button class="tab-btn" id="tab-lugar">Por lugar</button>
            </div>

            <!-- Tab: Por fecha -->
            <div class="tab-content" id="panel-recorrido">
              <div class="quick-range">
                <button class="quick-range__btn" id="btn-hoy">Hoy</button>
                <button class="quick-range__btn" id="btn-semana">1 semana</button>
                <button class="quick-range__btn" id="btn-mes">1 mes</button>
              </div>
              <div class="range-fields">
                <div class="range-field">
                  <span class="range-field__label">Inicio</span>
                  <input type="datetime-local" id="fecha-inicio" class="input-datetime" step="1" />
                </div>
                <div class="range-field">
                  <span class="range-field__label">Fin</span>
                  <input type="datetime-local" id="fecha-fin" class="input-datetime" step="1" />
                </div>
              </div>
              <div class="btn-group">
                <button id="btn-historial" class="btn btn--primary">Ver recorrido</button>
              </div>
            </div>

            <!-- Tab: Por lugar -->
            <div class="tab-content tab-content--hidden" id="panel-lugar">
              <p class="search-hint">Escribe una dirección o haz clic en el mapa para buscar cuándo pasó el vehículo por esa zona.</p>
              <div class="search-field">
                <input type="text" id="input-lugar" class="input-lugar" placeholder="Ej: CC Buenavista, Calle 72..." />
                <button id="btn-buscar-lugar" class="btn btn--primary btn--search">Buscar</button>
              </div>
              <div id="resultado-busqueda" class="search-result"></div>
            </div>

            <!-- Boton volver a vivo (siempre visible) -->
            <div class="btn-vivo-wrap">
              <button id="btn-vivo" class="btn btn--secondary btn--active">Ver en vivo</button>
            </div>
          </section>

        </aside>

        <div class="map-area">
          <div class="map-container">
            <div id="mapa"></div>
            <div class="map-info">
              <div class="map-info__row">
                <span class="map-info__label">Modo</span>
                <span class="map-info__value map-info__value--live" id="map-mode">EN VIVO</span>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="footer">
        © 2026 <span>urbanTrack GPS</span> — Real-Time Fleet Management
      </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
