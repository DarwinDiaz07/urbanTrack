<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPS Tracker</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ── Header ────────────────────────────────────────── -->
      <header class="header">
        <div class="header__brand">
          <span class="header__icon">🚕</span>
          <span class="header__title">GPS Tracker</span>
        </div>
        <div class="header__status">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="estado">Desconectado</span>
        </div>
      </header>
      <div class="taxi-stripe"></div>

      <!-- ── Dashboard ─────────────────────────────────────── -->
      <main class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
          <!-- Current Position Card -->
          <section class="card">
            <div class="card__header">
              <h2 class="card__title">📍 Posición Actual</h2>
              <span class="badge-live">
                <span class="badge-live__dot"></span>
                LIVE
              </span>
            </div>
            <div class="data-grid">
              <div class="data-item">
                <span class="data-item__label">Latitud</span>
                <span class="data-item__value data-item__value--coord" id="latitud">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Longitud</span>
                <span class="data-item__value data-item__value--coord" id="longitud">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Fecha</span>
                <span class="data-item__value" id="fecha">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Hora</span>
                <span class="data-item__value" id="hora">—</span>
              </div>
            </div>
          </section>

          <!-- History Table -->
          <section class="history-section">
            <div class="card__header">
              <h2 class="card__title">📋 Historial de Viaje</h2>
            </div>
            <div class="history-table-wrap">
              <table class="history-table">
                <thead>
                  <tr>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Latitud</th>
                    <th>Longitud</th>
                  </tr>
                </thead>
                <tbody id="tabla-body">
                  <tr class="empty-row">
                    <td colspan="4">Sin datos</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </aside>

        <!-- Map -->
        <div class="map-area">
          <div class="map-container">
            <div id="mapa"></div>
            <div class="map-info">
              <div class="map-info__row">
                <span class="map-info__label">Última actualización</span>
                <span class="map-info__value" id="map-time">--:--:--</span>
              </div>
              <div class="map-info__row">
                <span class="map-info__label">Coordenadas</span>
                <span class="map-info__value" id="map-coords">—, —</span>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- ── Footer ────────────────────────────────────────── -->
      <footer class="footer">
        © 2026 <span>TaxiTracker GPS</span> — Real-Time Fleet Management
      </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
