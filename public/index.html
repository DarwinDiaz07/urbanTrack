<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPS Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ── Header ────────────────────────────────────────── -->
      <header class="header">
        <div class="header__brand">
          <span class="header__icon">🚕</span>
          <span class="header__title">GPS Tracker</span>
        </div>
        <div class="header__status">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="estado">Desconectado</span>
        </div>
      </header>
      <div class="taxi-stripe"></div>

      <!-- ── Dashboard ─────────────────────────────────────── -->
      <main class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">

          <!-- Current Position Card -->
          <section class="card">
            <div class="card__header">
              <h2 class="card__title">📍 Posición Actual</h2>
              <span class="badge-live">
                <span class="badge-live__dot"></span>
                LIVE
              </span>
            </div>
            <div class="data-grid">
              <div class="data-item">
                <span class="data-item__label">Latitud</span>
                <span class="data-item__value data-item__value--coord" id="latitud">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Longitud</span>
                <span class="data-item__value data-item__value--coord" id="longitud">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Fecha</span>
                <span class="data-item__value" id="fecha">—</span>
              </div>
              <div class="data-item">
                <span class="data-item__label">Hora</span>
                <span class="data-item__value" id="hora">—</span>
              </div>
            </div>
          </section>

          <!-- History Range Card -->
          <section class="card">
            <div class="card__header">
              <h2 class="card__title">🕐 Consultar Recorrido</h2>
            </div>
            <div class="range-fields">
              <div class="range-field">
                <span class="range-field__label">Inicio</span>
                <input type="datetime-local" id="fecha-inicio" class="input-datetime" />
              </div>
              <div class="range-field">
                <span class="range-field__label">Fin</span>
                <input type="datetime-local" id="fecha-fin" class="input-datetime" />
              </div>
            </div>
            <div class="btn-group">
              <button id="btn-historial" class="btn btn--primary">Ver historial</button>
              <button id="btn-vivo" class="btn btn--secondary">Ver en vivo</button>
            </div>
          </section>

        </aside>

        <!-- Map -->
        <div class="map-area">
          <div class="map-container">
            <div id="mapa"></div>
            <div class="map-info">
              <div class="map-info__row">
                <span class="map-info__label">Última actualización</span>
                <span class="map-info__value" id="map-time">--:--:--</span>
              </div>
              <div class="map-info__row">
                <span class="map-info__label">Coordenadas</span>
                <span class="map-info__value" id="map-coords">—, —</span>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- ── Footer ────────────────────────────────────────── -->
      <footer class="footer">
        © 2026 <span>urbanTrack GPS</span> — Real-Time Fleet Management
      </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
